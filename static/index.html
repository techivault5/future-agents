<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Agents Marketplace</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --text: #e2e8f0;
      --muted: #8892a4;
      --danger: #ef4444;
      --warn: #f59e0b;
      --success: #10b981;
      --radius: 10px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 1.1rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
    .logo span { color: var(--accent2); }
    .header-stats { display: flex; gap: 20px; margin-left: auto; font-size: 0.8rem; color: var(--muted); }
    .stat-pill { background: var(--surface2); padding: 4px 10px; border-radius: 20px; }
    .stat-pill strong { color: var(--accent2); }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
      overflow-y: auto;
      height: calc(100vh - 60px);
      position: sticky;
      top: 60px;
    }
    .sidebar h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }
    .filter-group { margin-bottom: 20px; }
    .filter-group select, .filter-group input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: var(--radius);
      font-size: 0.85rem;
    }
    .filter-group select option { background: var(--surface2); }
    .btn { cursor: pointer; border: none; border-radius: var(--radius); font-size: 0.85rem; padding: 8px 14px; font-weight: 600; transition: opacity .15s; }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm { padding: 5px 10px; font-size: 0.78rem; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-warn { background: var(--warn); color: #000; }
    .btn-accent2 { background: var(--accent2); color: #000; }

    /* ── Category list ── */
    .category-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 0.82rem;
      transition: background .15s;
    }
    .category-item:hover { background: var(--surface2); }
    .category-item.active { background: var(--accent); color: #fff; }
    .cat-count { font-size: 0.72rem; background: rgba(255,255,255,.1); padding: 1px 6px; border-radius: 10px; }

    /* ── Main area ── */
    main { flex: 1; padding: 24px; overflow-y: auto; }

    /* ── Search bar ── */
    .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 0.9rem;
    }
    .search-bar input:focus { outline: 2px solid var(--accent); }

    /* ── Agent grid ── */
    .agent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }
    .agent-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .agent-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .card-title { font-size: 0.88rem; font-weight: 600; line-height: 1.3; }
    .badge {
      font-size: 0.68rem; padding: 2px 7px; border-radius: 10px;
      white-space: nowrap; font-weight: 600;
    }
    .badge-technical { background: rgba(108,99,255,.25); color: #a09cf7; }
    .badge-non-technical { background: rgba(0,212,170,.2); color: var(--accent2); }
    .badge-voice { background: rgba(245,158,11,.2); color: var(--warn); }
    .badge-senior { background: rgba(16,185,129,.15); color: var(--success); }
    .badge-junior { background: rgba(239,68,68,.15); color: var(--danger); }
    .badge-mid { background: rgba(148,163,184,.15); color: var(--muted); }
    .badge-intern { background: rgba(239,68,68,.1); color: #f87171; }
    .badge-strict { background: rgba(239,68,68,.2); color: var(--danger); }
    .badge-architect { background: rgba(139,92,246,.25); color: #c4b5fd; }
    .badge-standard { background: rgba(148,163,184,.1); color: var(--muted); }
    .card-meta { font-size: 0.75rem; color: var(--muted); }
    .skill-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip { font-size: 0.68rem; background: var(--surface2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 6px; color: var(--muted); }
    .card-actions { display: flex; gap: 6px; margin-top: 4px; }

    /* ── Pagination ── */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 24px; }
    .page-info { font-size: 0.82rem; color: var(--muted); }

    /* ── Modal overlay ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7);
      z-index: 200; align-items: flex-start; justify-content: center; padding: 40px 16px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 700px;
      padding: 28px;
      position: relative;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--surface2); border: none; color: var(--text);
      width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 1rem;
    }
    .modal h2 { font-size: 1.15rem; margin-bottom: 6px; }
    .modal-meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 16px; }
    .section-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .detail-item { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
    .detail-item .label { font-size: 0.7rem; color: var(--muted); margin-bottom: 3px; }
    .detail-item .value { font-size: 0.85rem; font-weight: 500; }

    /* ── Connector tabs ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
    .tab {
      padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--text);
      transition: background .15s;
    }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* ── Code blocks ── */
    pre {
      background: #0a0c14; border: 1px solid var(--border); border-radius: 8px;
      padding: 14px; font-size: 0.78rem; overflow-x: auto; white-space: pre-wrap;
      word-break: break-all; color: #a8b4c8; max-height: 340px; overflow-y: auto;
      font-family: 'Fira Code', 'Consolas', monospace;
    }
    .copy-btn-wrap { display: flex; justify-content: flex-end; margin-bottom: 6px; }

    /* ── Test panel ── */
    .test-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius); padding: 10px; font-size: 0.85rem; min-height: 80px; resize: vertical; font-family: var(--font); margin-bottom: 10px; }
    .test-input:focus { outline: 2px solid var(--accent); }
    .test-result { background: #0a0c14; border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 0.82rem; color: #a8b4c8; min-height: 60px; white-space: pre-wrap; line-height: 1.6; }
    .test-result strong { color: var(--accent2); }
    .result-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--success); color: #fff;
      padding: 10px 18px; border-radius: 8px;
      font-size: 0.85rem; font-weight: 600;
      opacity: 0; transition: opacity .3s; z-index: 999; pointer-events: none;
    }
    #toast.show { opacity: 1; }

    /* ── Loading ── */
    .loading { text-align: center; color: var(--muted); padding: 40px; font-size: 0.9rem; }
    .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty h3 { font-size: 1.1rem; margin-bottom: 8px; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .detail-grid { grid-template-columns: 1fr; }
      .header-stats { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">IT Agents <span>Marketplace</span></div>
  <div class="header-stats" id="headerStats">
    <div class="stat-pill">Loading…</div>
  </div>
</header>

<div class="layout">

  <!-- Sidebar filters -->
  <aside class="sidebar">
    <div class="filter-group">
      <h3>Type</h3>
      <select id="filterType" onchange="applyFilters()">
        <option value="">All types</option>
        <option value="technical">Technical</option>
        <option value="non-technical">Non-Technical</option>
        <option value="voice">Voice</option>
      </select>
    </div>
    <div class="filter-group">
      <h3>Seniority</h3>
      <select id="filterSeniority" onchange="applyFilters()">
        <option value="">All levels</option>
        <option value="intern">Intern</option>
        <option value="junior">Junior</option>
        <option value="mid">Mid</option>
        <option value="senior">Senior</option>
        <option value="staff">Staff</option>
        <option value="principal">Principal</option>
        <option value="architect">Architect</option>
        <option value="distinguished">Distinguished</option>
        <option value="fellow">Fellow</option>
      </select>
    </div>
    <div class="filter-group">
      <h3>Cloud</h3>
      <select id="filterCloud" onchange="applyFilters()">
        <option value="">All clouds</option>
        <option value="aws">AWS</option>
        <option value="gcp">GCP</option>
        <option value="azure">Azure</option>
      </select>
    </div>
    <div class="filter-group">
      <h3>Guardrails Profile</h3>
      <select id="filterProfile" onchange="applyFilters()">
        <option value="">All profiles</option>
        <option value="standard">Standard</option>
        <option value="strict">Strict</option>
        <option value="relaxed">Relaxed</option>
        <option value="architect">Architect</option>
      </select>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="clearFilters()" style="width:100%;margin-bottom:24px;">Clear filters</button>

    <div class="filter-group">
      <h3>Role Categories</h3>
      <div id="categoryList" style="max-height:300px;overflow-y:auto;"></div>
    </div>
  </aside>

  <!-- Main content -->
  <main>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search agents by name or role…" oninput="debounceSearch()" />
      <button class="btn btn-primary" onclick="applyFilters()">Search</button>
    </div>

    <div id="agentGrid" class="agent-grid">
      <div class="loading"><span class="spinner"></span>Loading agents…</div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- Agent detail modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBackdrop(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<div id="toast">Copied!</div>

<script>
  const API = '';  // same origin
  let currentPage = 1;
  let currentFilters = {};
  let searchTimer = null;
  let statsCache = null;

  // ── Initialise ────────────────────────────────────────────────
  async function init() {
    await Promise.all([loadStats(), loadCategories()]);
    await loadAgents();
  }

  async function loadStats() {
    try {
      const r = await fetch(`${API}/api/stats`);
      statsCache = await r.json();
      document.getElementById('headerStats').innerHTML = `
        <div class="stat-pill"><strong>${statsCache.total_agents.toLocaleString()}</strong> agents</div>
        <div class="stat-pill"><strong>${statsCache.technical.toLocaleString()}</strong> technical</div>
        <div class="stat-pill"><strong>${statsCache.non_technical.toLocaleString()}</strong> non-technical</div>
      `;
    } catch (e) { console.error('Stats load failed', e); }
  }

  async function loadCategories() {
    try {
      const r = await fetch(`${API}/api/categories`);
      const cats = await r.json();
      const el = document.getElementById('categoryList');
      el.innerHTML = cats.slice(0, 40).map(c => `
        <div class="category-item" onclick="filterByCategory('${c.category}', '${c.type}')">
          <span>${c.category.replace(/-/g,' ')}</span>
          <span class="cat-count">${c.count}</span>
        </div>
      `).join('');
    } catch (e) { console.error('Categories load failed', e); }
  }

  // ── Load + render agents ──────────────────────────────────────
  async function loadAgents(page = 1) {
    currentPage = page;
    const grid = document.getElementById('agentGrid');
    grid.innerHTML = '<div class="loading"><span class="spinner"></span>Loading…</div>';

    const params = new URLSearchParams({ page, page_size: 24 });
    const q = document.getElementById('searchInput').value.trim();
    if (q) params.set('q', q);
    if (currentFilters.type) params.set('type', currentFilters.type);
    if (currentFilters.seniority) params.set('seniority', currentFilters.seniority);
    if (currentFilters.cloud) params.set('cloud', currentFilters.cloud);
    if (currentFilters.profile) params.set('profile', currentFilters.profile);
    if (currentFilters.role) params.set('role', currentFilters.role);

    try {
      const r = await fetch(`${API}/api/agents?${params}`);
      const data = await r.json();
      renderAgents(data);
    } catch (e) {
      grid.innerHTML = `<div class="empty"><h3>Failed to load agents</h3><p>${e.message}</p></div>`;
    }
  }

  function renderAgents(data) {
    const grid = document.getElementById('agentGrid');
    if (!data.agents || data.agents.length === 0) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><h3>No agents found</h3><p>Try different filters or search terms.</p></div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = data.agents.map(a => `
      <div class="agent-card" onclick="openAgent('${a.id}')">
        <div class="card-header">
          <div class="card-title">${a.name}</div>
          <span class="badge badge-${a.type?.replace('-','-')}">${a.type || 'unknown'}</span>
        </div>
        <div class="card-meta">${a.role?.replace(/-/g,' ')} · ${a.industry_focus || 'general'} · ${a.cloud_preference || 'any cloud'}</div>
        <div class="skill-chips">
          <span class="badge badge-${a.seniority}">${a.seniority}</span>
          ${a.primary_stack ? `<span class="chip">${a.primary_stack}</span>` : ''}
          <span class="badge badge-${a.guardrails_profile}">${a.guardrails_profile}</span>
        </div>
        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openAgent('${a.id}')">Details</button>
          <button class="btn btn-accent2 btn-sm" onclick="event.stopPropagation();openConnector('${a.id}')">Connector ↗</button>
        </div>
      </div>
    `).join('');

    renderPagination(data);
  }

  function renderPagination(data) {
    const el = document.getElementById('pagination');
    if (data.pages <= 1) { el.innerHTML = ''; return; }
    const p = data.page;
    el.innerHTML = `
      <button class="btn btn-ghost btn-sm" onclick="loadAgents(${p-1})" ${p<=1?'disabled':''}>← Prev</button>
      <span class="page-info">Page ${p} of ${data.pages} (${data.total.toLocaleString()} agents)</span>
      <button class="btn btn-ghost btn-sm" onclick="loadAgents(${p+1})" ${p>=data.pages?'disabled':''}>Next →</button>
    `;
  }

  // ── Filters ───────────────────────────────────────────────────
  function applyFilters() {
    currentFilters.type = document.getElementById('filterType').value;
    currentFilters.seniority = document.getElementById('filterSeniority').value;
    currentFilters.cloud = document.getElementById('filterCloud').value;
    currentFilters.profile = document.getElementById('filterProfile').value;
    loadAgents(1);
  }

  function clearFilters() {
    document.getElementById('filterType').value = '';
    document.getElementById('filterSeniority').value = '';
    document.getElementById('filterCloud').value = '';
    document.getElementById('filterProfile').value = '';
    document.getElementById('searchInput').value = '';
    currentFilters = {};
    document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
    loadAgents(1);
  }

  function filterByCategory(role, type) {
    currentFilters.role = role;
    currentFilters.type = type;
    document.getElementById('filterType').value = type;
    document.querySelectorAll('.category-item').forEach(el => {
      el.classList.toggle('active', el.querySelector('span').textContent === role.replace(/-/g,' '));
    });
    loadAgents(1);
  }

  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => applyFilters(), 350);
  }

  // ── Agent detail modal ────────────────────────────────────────
  async function openAgent(agentId) {
    showModal('<div class="loading"><span class="spinner"></span>Loading agent…</div>');
    try {
      const r = await fetch(`${API}/api/agents/${agentId}`);
      if (!r.ok) throw new Error('Agent not found');
      const a = await r.json();
      renderAgentModal(a);
    } catch (e) {
      document.getElementById('modalContent').innerHTML = `<p style="color:var(--danger)">Error: ${e.message}</p>`;
    }
  }

  function renderAgentModal(a) {
    document.getElementById('modalContent').innerHTML = `
      <h2>${a.name}</h2>
      <div class="modal-meta">
        ${a.role?.replace(/-/g,' ')} · ${a.type} · ${a.industry_focus || 'general'} · ${a.cloud_preference || 'any cloud'}
      </div>
      ${a.description ? `<p style="font-size:.85rem;color:var(--muted);margin-bottom:16px;">${a.description}</p>` : ''}

      <div class="detail-grid">
        <div class="detail-item"><div class="label">Seniority</div><div class="value">${a.seniority}</div></div>
        <div class="detail-item"><div class="label">Primary Stack</div><div class="value">${a.primary_stack || 'N/A'}</div></div>
        <div class="detail-item"><div class="label">Guardrails Profile</div><div class="value"><span class="badge badge-${a.guardrails_profile}">${a.guardrails_profile}</span></div></div>
        <div class="detail-item"><div class="label">Human Escalation</div><div class="value">${a.human_input_required ? '⚠️ Required' : '✅ Automated'}</div></div>
      </div>

      <div style="margin-bottom:16px;">
        <div class="section-label">Skills</div>
        <div class="skill-chips">${(a.skills||[]).map(s=>`<span class="chip">${s}</span>`).join('')}</div>
      </div>
      <div style="margin-bottom:16px;">
        <div class="section-label">Tools</div>
        <div class="skill-chips">${(a.tools||[]).map(t=>`<span class="chip">${t}</span>`).join('')}</div>
      </div>
      <div style="margin-bottom:20px;">
        <div class="section-label">Certifications</div>
        <div class="skill-chips">${(a.certifications||[]).map(c=>`<span class="chip">${c}</span>`).join('') || '<span style="color:var(--muted);font-size:.8rem">None listed</span>'}</div>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('test','${a.id}')">🧪 Test Agent</div>
        <div class="tab" onclick="switchTab('openapi','${a.id}')">📄 OpenAPI</div>
        <div class="tab" onclick="switchTab('mcp','${a.id}')">🤖 MCP Config</div>
        <div class="tab" onclick="switchTab('curl','${a.id}')">💻 cURL</div>
      </div>

      <div id="tab-test" class="tab-content active">
        <textarea class="test-input" id="testPrompt" placeholder="Ask the agent a question…"
          >How would you approach a ${(a.role||'').replace(/-/g,' ')} challenge?</textarea>
        <button class="btn btn-primary" onclick="runTest('${a.id}')">Run Test</button>
        <div id="testResult" class="test-result" style="margin-top:12px;display:none;"></div>
      </div>

      <div id="tab-openapi" class="tab-content">
        <p style="font-size:.8rem;color:var(--muted);margin-bottom:10px;">
          Import this URL into Postman, Insomnia, or any OpenAPI client:
          <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:.78rem;">
            /api/agents/${a.id}/connector/openapi
          </code>
        </p>
        <div class="copy-btn-wrap"><button class="btn btn-ghost btn-sm" onclick="copyConnector('openapi','${a.id}')">Copy JSON</button></div>
        <div id="openapi-preview-${a.id}" style="color:var(--muted);font-size:.8rem;">Click to load preview…</div>
        <button class="btn btn-ghost btn-sm" onclick="loadConnectorPreview('openapi','${a.id}')" style="margin-top:8px;">Load Preview</button>
      </div>

      <div id="tab-mcp" class="tab-content">
        <p style="font-size:.8rem;color:var(--muted);margin-bottom:10px;">
          Add this to your <code style="background:var(--surface2);padding:2px 6px;border-radius:4px;">~/.config/claude/claude_desktop_config.json</code>
          to use this agent as an MCP tool in Claude Desktop.
        </p>
        <div class="copy-btn-wrap"><button class="btn btn-ghost btn-sm" onclick="copyConnector('mcp','${a.id}')">Copy JSON</button></div>
        <div id="mcp-preview-${a.id}" style="color:var(--muted);font-size:.8rem;">Click to load preview…</div>
        <button class="btn btn-ghost btn-sm" onclick="loadConnectorPreview('mcp','${a.id}')" style="margin-top:8px;">Load Preview</button>
      </div>

      <div id="tab-curl" class="tab-content">
        <p style="font-size:.8rem;color:var(--muted);margin-bottom:10px;">
          Copy-paste these commands to test from any terminal.
        </p>
        <div class="copy-btn-wrap"><button class="btn btn-ghost btn-sm" onclick="copyConnector('curl','${a.id}')">Copy Script</button></div>
        <div id="curl-preview-${a.id}" style="color:var(--muted);font-size:.8rem;">Click to load preview…</div>
        <button class="btn btn-ghost btn-sm" onclick="loadConnectorPreview('curl','${a.id}')" style="margin-top:8px;">Load Preview</button>
      </div>
    `;
  }

  // ── Tab switching ─────────────────────────────────────────────
  function switchTab(name, agentId) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(`tab-${name}`).classList.add('active');
  }

  // ── Test agent ────────────────────────────────────────────────
  async function runTest(agentId) {
    const prompt = document.getElementById('testPrompt').value.trim();
    if (!prompt) return;
    const resultEl = document.getElementById('testResult');
    resultEl.style.display = 'block';
    resultEl.innerHTML = '<span class="spinner"></span> Thinking…';

    try {
      const r = await fetch(`${API}/api/agents/${agentId}/test`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt }),
      });
      const d = await r.json();
      resultEl.innerHTML = `
        <div style="margin-bottom:10px;line-height:1.7;">${d.response.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>
        <div class="section-label" style="margin-top:12px;">Relevant Skills</div>
        <div class="result-chips">${(d.relevant_skills||[]).map(s=>`<span class="chip">${s}</span>`).join('')}</div>
        <div class="section-label" style="margin-top:10px;">Recommended Tools</div>
        <div class="result-chips">${(d.recommended_tools||[]).map(t=>`<span class="chip">${t}</span>`).join('')}</div>
        <div style="margin-top:12px;font-size:.75rem;color:var(--muted);">
          Profile: <span class="badge badge-${d.guardrails_profile}">${d.guardrails_profile}</span>
          ${d.human_escalation_required ? ' · ⚠️ Human escalation required' : ''}
        </div>
      `;
    } catch (e) {
      resultEl.innerHTML = `<span style="color:var(--danger)">Error: ${e.message}</span>`;
    }
  }

  // ── Connector preview + copy ──────────────────────────────────
  async function loadConnectorPreview(type, agentId) {
    const el = document.getElementById(`${type}-preview-${agentId}`);
    el.innerHTML = '<span class="spinner"></span> Loading…';
    try {
      const r = await fetch(`${API}/api/agents/${agentId}/connector/${type}`);
      const text = await r.text();
      el.innerHTML = `<pre>${escHtml(text.slice(0, 4000))}${text.length>4000?'\n…(truncated)':''}</pre>`;
    } catch (e) {
      el.innerHTML = `<span style="color:var(--danger)">Error: ${e.message}</span>`;
    }
  }

  async function copyConnector(type, agentId) {
    const r = await fetch(`${API}/api/agents/${agentId}/connector/${type}`);
    const text = await r.text();
    await navigator.clipboard.writeText(text);
    showToast('Copied to clipboard!');
  }

  async function openConnector(agentId) {
    window.open(`${API}/api/agents/${agentId}/connector`, '_blank');
  }

  // ── Modal helpers ─────────────────────────────────────────────
  function showModal(html) {
    document.getElementById('modalContent').innerHTML = html;
    document.getElementById('modalOverlay').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }
  function closeModalOnBackdrop(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Toast ─────────────────────────────────────────────────────
  function showToast(msg = 'Done!') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Utils ─────────────────────────────────────────────────────
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Boot ──────────────────────────────────────────────────────
  init();
</script>
</body>
</html>
