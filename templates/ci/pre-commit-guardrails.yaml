# ════════════════════════════════════════════════════════════════
# pre-commit hooks — Guardrails Integration
# Add to .pre-commit-config.yaml in your project.
# Run: pre-commit install
# ════════════════════════════════════════════════════════════════
repos:
  # ── Secrets ────────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: Detect secrets with gitleaks

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ['--baseline', '.secrets.baseline']

  # ── Python Quality ──────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies: [types-all]

  # ── General ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]
      - id: check-case-conflict
      - id: mixed-line-ending

  # ── IT Agents Guardrails ─────────────────────────────────────────
  - repo: local
    hooks:
      - id: it-agents-guardrails
        name: IT Agents Guardrails
        entry: python guardrails/guardrails_engine.py . --mode block
        language: python
        pass_filenames: false
        always_run: true
        additional_dependencies: [pyyaml, packaging]
