# ════════════════════════════════════════════════════════════════
# GitLab CI — Guardrails Job
# Include this in your .gitlab-ci.yml:
#   include:
#     - local: templates/ci/gitlab-ci-guardrails.yml
# ════════════════════════════════════════════════════════════════

stages:
  - guardrails
  - test
  - build
  - deploy

guardrails:
  stage: guardrails
  image: python:3.11-slim
  before_script:
    - pip install --quiet pyyaml packaging
  script:
    - python guardrails/guardrails_engine.py . --mode check
  variables:
    GUARDRAILS_INTERACTIVE: "false"
    GUARDRAILS_CONFIG: config/guardrails_config.yaml
  artifacts:
    reports:
      sast: .guardrails-report.json
    paths:
      - .guardrails-report.json
    when: always
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
