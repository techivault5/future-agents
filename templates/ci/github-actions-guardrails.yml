# ════════════════════════════════════════════════════════════════
# GitHub Actions — Guardrails Workflow
# Add this file to .github/workflows/guardrails.yml in your repo.
# ════════════════════════════════════════════════════════════════
name: Guardrails

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master, "release/**"]

permissions:
  contents: read
  security-events: write       # Required for SARIF upload
  pull-requests: write         # Required for PR comments

jobs:
  guardrails:
    name: Run Guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0       # Full history for better secret scanning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install guardrails dependencies
        run: |
          pip install pyyaml packaging
          # Install optional: pip install truffleHog detect-secrets

      - name: Run secrets scan
        id: secrets
        run: |
          python guardrails/guardrails_engine.py . --mode check
        env:
          GUARDRAILS_INTERACTIVE: "false"
          GUARDRAILS_CONFIG: config/guardrails_config.yaml

      - name: Run package policy check
        id: packages
        if: always()
        run: |
          python guardrails/guardrails_engine.py . --mode check
        env:
          GUARDRAILS_INTERACTIVE: "false"

      - name: Upload SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .guardrails.sarif
        continue-on-error: true

      - name: Upload guardrails report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guardrails-report
          path: .guardrails-report.json

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = {};
            try {
              report = JSON.parse(fs.readFileSync('.guardrails-report.json', 'utf8'));
            } catch (e) {
              console.log('No report found');
              return;
            }
            const status = report.passed ? '✅ PASSED' : '❌ FAILED';
            const body = `## Guardrails Report — ${status}
            | Check | Count |
            |-------|-------|
            | 🚫 Violations | ${report.summary?.violations ?? 0} |
            | ⚠️ Warnings | ${report.summary?.warnings ?? 0} |
            | 👤 Human Escalations | ${report.summary?.escalations ?? 0} |
            | 🔧 Auto Fixes | ${report.summary?.auto_fixes ?? 0} |

            ${report.violations?.length > 0 ? '### Violations\n' +
              report.violations.map(v => `- **${v.rule}** (${v.severity}): ${v.message}`).join('\n') : ''}
            `;
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
